version: "3.9"

services:
  backend:
    build: ./apps/backend
    container_name: localforge-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: unless-stopped
    # Resource limits for ML tools (OCR, face detection, background removal)
    # Total: 8GB RAM on host, limit backend to 5GB to leave room for frontend
    deploy:
      resources:
        limits:
          cpus: '1.5'  # Leave 0.5 cores for other processes
          memory: 5G
        reservations:
          cpus: '0.5'
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      # Persist temporary files for ML models between restarts
      - ml_cache:/tmp/.cache
    environment:
      # Python optimizations for ML
      - OMP_NUM_THREADS=2
      - OPENBLAS_NUM_THREADS=2
      - MKL_NUM_THREADS=2
      - VECLIB_MAXIMUM_THREADS=2
      - NUMEXPR_NUM_THREADS=2

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: localforge-frontend
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  ml_cache:
    driver: local
